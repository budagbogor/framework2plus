name: Build Tauri Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2.0.0

      - name: Build Tauri App
        run: tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Include "*.msi","*.exe","*.deb","*.AppImage" | Select-Object FullName, Length

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: DevForge-Studio-Windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 'DevForge Studio ${{ github.ref_name }}'
          body: |
            🚀 **DevForge Studio ${{ github.ref_name }}** — Framework Generator untuk Developer Indonesia

            ### ✨ Fitur Utama:
            - 🌐 **Generator Website** — Landing page, Blog, Portfolio, SEO optimized
            - 💻 **Generator Software** — Full-stack, Mobile App, SaaS, E-commerce
            - 🤖 **Generator Agentic AI** — Multi-agent pipeline, RAG system, Chatbot
            - 🚀 **Live Builder** — Orkestrasi 4 agen AI (Arsitek → Coder → QA → DevOps)
            - 📦 **Export ZIP** — Download seluruh project bundle langsung

            ### 🖥️ Cara Install Windows:
            1. Download file `.msi` atau `.exe` di bawah
            2. Jalankan installer
            3. Buka **DevForge Studio** dari Start Menu

            ### 🌐 Versi Online:
            Akses langsung tanpa install: [budagbogor.github.io/framework2plus](https://budagbogor.github.io/framework2plus)
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
